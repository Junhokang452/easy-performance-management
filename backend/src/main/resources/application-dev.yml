# dev profile — 자매품 9호 단계 1 BE-CC-1 진입 (2026-06-08).
# 로컬 PostgreSQL 단일 DB + lib autoconfig 게이트 ON (tenantctx + error + audit).
# jobeval dev profile 정합.

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/easy_performance_management}
    username: ${DB_USERNAME:easy_performance_management}
    password: ${DB_PASSWORD:postgres}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# lib autoconfig 게이트 — dev 진입 ON.
#   단계 1 (BE-CC-1) = tenantctx + error + audit (b83acac 정합)
#   단계 2 (G65 D=A, Task #100) = stage2 + tenantbootstrap + multitenancy-enabled (옵션 A 보수)
#   단계 3 (G84 D=A, Task #122, 2026-06-08) = JWT secret dev fallback (HS512 64+ bytes 충족)
#   단계 4~5 진입 시 후속 게이트 ON 으로 전환.
easyplatform:
  tenantctx:
    enabled: true
  error:
    enabled: true
  audit:
    enabled: true
  # 단계 2 — PerformanceTenantBootstrapConfig 어댑터 빈 등록 (lib BE 14 thin adapter)
  performance:
    stage2:
      enabled: true
  # 단계 2 — lib TenantBootstrap autoconfig 활성
  tenantbootstrap:
    enabled: true
  # 단계 3 BE-CC-2 JWT 5분리 — dev 진입 박제 시크릿 (HS512 64+ bytes 충족, JwtSecretValidator 통과).
  # LIVE 는 환경변수 JWT_SECRET 필수 (application-prod.yml fail-fast).
  jwt:
    secret: ${JWT_SECRET:dev-only-performance-jwt-secret-please-rotate-in-prod-via-env-jwt-secret-min-64bytes-required-12345678}
    algorithm: HS512

# 단계 3 BE-CC-2 — dev access TTL (5분) + refresh TTL (7일) + stub login default tenant.
app:
  security:
    jwt:
      secret: ${JWT_SECRET:dev-only-performance-jwt-secret-please-rotate-in-prod-via-env-jwt-secret-min-64bytes-required-12345678}
      expiration: 300000          # 5분 (자매품 표준)
      refresh-expiration: 604800000  # 7일
    auth:
      dev-default-tenant-id: 00000000-0000-0000-0000-000000000001

# 인증 격상 (2026-06-12) — dev 5 페르소나 시더 ON (옵션 A 보수: dev 만 ON, 기본 OFF).
# dev-super-admin/dev-hr-admin/dev-director/dev-manager/dev-employee @performance.dev, pw 'dev'.
performance:
  auth:
    seed-dev-accounts: ${PERFORMANCE_AUTH_SEED_DEV_ACCOUNTS:true}

# easy-platform-core 멀티테넌시 — 단계 2 dev 활성
# control-plane-owner=false: easy-ware 가 control plane SoT (ADR-007 + S5 hcm 정렬)
# api-key: NEON_API_KEY 부재 시 옵션 B 셀프 폴백 (안전 NO-OP)
easyware:
  neon:
    multitenancy-enabled: true
    control-plane-owner: false

# Neon 프로비저닝 — dev 진입 (NEON_API_KEY 정합 시 실 호출, 부재 시 옵션 B 폴백)
neon:
  api:
    key: ${NEON_API_KEY:}
  project:
    prefix: easyrecord-performance-
  region: ap-northeast-1

# dev 로깅 — 단계 1 (com.easyperformance DEBUG + Hibernate SQL DEBUG) +
#   단계 2 (PerformanceTenantBootstrapConfig 3 SPI + NeonProvisioningService)
logging:
  level:
    com.easyperformance: DEBUG
    com.easyperformance.platform: INFO
    com.easyware.platform.tenant: INFO
    com.easyware.platform.tenantctx: INFO
    com.easyware.platform.NeonProvisioningService: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
