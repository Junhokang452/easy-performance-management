# easy-performance-management 기본 application 설정 (단계 1 BE-CC-1, 2026-06-08).
# 자매품 9호 — ADR-022 정식 편입 + ADR-031 B2B-Enterprise per-tenant + SMB Shared (정정 2026-06-08, Task #98).
# 옵션 A 보수 — lib autoconfig 게이트는 dev 만 ON.
#
# Profile:
#   default = 본 파일 (안전 fallback, LIVE 호환 게이트 OFF)
#   dev     = application-dev.yml (lib 게이트 ON, localhost PG)
#   prod    = application-prod.yml (LIVE 가시화 B2B-Enterprise per-tenant 본질, ${} 환경 변수)
#   smb     = application-smb.yml (SMB Shared DB + RLS tenant_id 옵션, 단계 5 G67 D=A, Task #105)

server:
  port: ${PORT:8087}
  address: 0.0.0.0

spring:
  application:
    name: easy-performance-management-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/easy_performance_management}
    username: ${DB_USERNAME:easy_performance_management}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      auto-commit: false

  jpa:
    open-in-view: false        # easy-standards 03 — OIV=false (N+1 / LazyInitializationException 차단)
    hibernate:
      ddl-auto: validate       # 스키마는 Flyway 가 소유 (ADR-006)
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 100  # D3.2 (2026-06-14, 90-conformance/sibling-jpa-performance-2026-06-14.md): SELECT N+1 방지
        jdbc:
          batch_size: 20
          batch_versioned_data: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    # 단계 1 = 단일 DB. 단계 2 진입 시 control plane 스키마 분리 (lib BE 14 TenantBootstrap fan-out).
    # 단계 5 SMB Shared 진입 시 RLS 정책 SQL 추가 (db/smb, application-smb.yml 에서 location 합성).
    # ~~단계 5 b2c~~ → ADR-031 정정 (2026-06-08, Task #98): performance 는 B2C 부재. SMB Shared 만 옵션.
    locations: classpath:db/migration
    schemas: public
    default-schema: public

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=10m

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

logging:
  level:
    com.easyperformance: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# springdoc OpenAPI (EC-FE-7) — 단계 4 EC-FE 진입 시 FE openapi-typescript 가 spec fetch.
# ~~단계 5 B2C 그룹 분리~~ → ADR-031 정정 (2026-06-08, Task #98): performance B2C 부재. SMB Shared 만 옵션.
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: false

# lib autoconfig 게이트 — 옵션 A 보수 (기본 OFF) + dev 명시 ON.
# 단계 1 진입 = tenantctx + error + audit. 단계 2 진입 = stage2 + tenantbootstrap (G65 D=A, Task #100).
easyplatform:
  # lib BE 23 (2026-06-14) — mono Render Docker SPA index.html 폴백 lib 흡수.
  # 게이트 ON 으로 lib `easyplatformSpaForwardingConfig` 활성, 자체 클래스 폐기 (자매품 정합 사본).
  spa:
    forwarding:
      enabled: ${EASY_PLATFORM_SPA_FORWARDING_ENABLED:true}
  tenantctx:
    enabled: ${EASYPLATFORM_TENANTCTX_ENABLED:false}
    header-name: ${EASYPLATFORM_TENANTCTX_HEADER:X-Tenant-Id}
  # 단계 2 진입 시 ON (Model B + RLS 정책 SQL 박제 후) — ADR-031 정합 (B2B-Enterprise per-tenant 본질)
  rls:
    tenant:
      enabled: ${EASYPLATFORM_RLS_TENANT_ENABLED:false}
  # ~~단계 5 B2C~~ → ADR-031 정정 (2026-06-08, Task #98): performance 는 B2C 부재. SMB Shared 옵션은 별도.
  b2c:
    enabled: ${EASYPLATFORM_B2C_ENABLED:false}
  # 단계 5 SMB Shared 옵션 게이트 (G67 D=A, Task #105, 2026-06-08) — application-smb.yml 진입 시 ON.
  # 옵션 A 보수: default OFF / smb profile 명시 ON.
  # 정합: ADR-031 자매품 9 × 3 토폴로지 — ware/hcm/recruit SMB 진입 패턴.
  # 단계 1 진입 시 ON (GlobalExceptionHandler 자동 등록)
  error:
    enabled: ${EASYPLATFORM_ERROR_ENABLED:false}
  # 단계 3 BE-CC-2 진입 시 활용. jjwt 0.12.6 HS512 ≥64바이트 fail-fast.
  jwt:
    secret: ${JWT_SECRET:}
    algorithm: HS512

  # lib BE 22 JwtRefreshAspect cutover (G127.6 D=A, Task #159, 2026-06-08).
  # lib commit 346306c — 자매품 7 동일 흐름 (RefreshTokenStore SPI + InMemoryRefreshTokenStore +
  # JwtRefreshService + JwtRefreshAutoConfiguration) 일반화. 자매품 lib BE 22 cutover 6호 (그린필드 모범 2호).
  # 활성 시: lib InMemoryRefreshTokenStore (ConditionalOnMissingBean) + JwtRefreshService 빈 자동 등록 →
  #   AuthService 가 lib JwtRefreshService.issueRefresh/rotate/logout 위임 → ~100+ LOC 감축 실증.
  # 옵션 A 채택 (그린필드, breaking change 0): 자체 RefreshTokenStore 빈 삭제 → lib 자동 등록.
  # 박제: backend/_workspace/PERFORMANCE_LIB_BE_22_CUTOVER_2026-06-08.md
  auth:
    refresh:
      enabled: ${EASYPLATFORM_AUTH_REFRESH_ENABLED:true}
      ttl: ${EASYPLATFORM_AUTH_REFRESH_TTL:PT168H}     # 7일 — JwtService refreshTtlMs 와 정합
  # 단계 1 진입 시 ON (AuditEventRecorder, lib BE-CC-1 W4)
  audit:
    enabled: ${EASYPLATFORM_AUDIT_ENABLED:false}
  # 단계 2 진입 게이트 (G65 D=A, Task #100, 2026-06-08) — PerformanceTenantBootstrapConfig 빈 등록 가시화.
  # lib BE 14 TenantBootstrap 3 SPI seam thin adapter (PlatformTenantLookup + TenantProvisioner + TenantMigrator).
  # 옵션 A 보수: dev ON / LIVE OFF (application-prod.yml 명시 OFF 가드).
  performance:
    stage2:
      enabled: ${EASYPLATFORM_PERFORMANCE_STAGE2_ENABLED:false}
      # ADR-055 b2.2 Option B (self-migrate) canary 토글 — 기본 false(legacy 3-SPI 경로 유지).
      # true 면 PerformanceTenantSelfBootstrapScheduler 가 TenantSchemaMigrator 로 db/migration Flyway 자체 적용 +
      # legacy PerformanceTenantBootstrapConfig/Controller 미등록(이중 경로 차단). 실 canary 활성은 env 로 결정.
      self-migrate-enabled: ${EASYPLATFORM_PERFORMANCE_STAGE2_SELF_MIGRATE_ENABLED:false}
    smb:
      enabled: ${EASYPLATFORM_PERFORMANCE_SMB_ENABLED:false}
  # 단계 2 진입 — lib TenantBootstrap autoconfig 게이트 (NeonProvisioningService dev 검증).
  tenantbootstrap:
    enabled: ${EASYPLATFORM_TENANTBOOTSTRAP_ENABLED:false}

# Neon 프로비저닝 — 단계 2 진입 시 ADR-024 (1 고객사 = 1 Neon 프로젝트) 정합.
# dev 진입 = NEON_API_KEY 정합 → 옵션 A lib 위임. NEON_API_KEY 부재 시 옵션 B 셀프 폴백 (안전 NO-OP).
neon:
  api:
    key: ${NEON_API_KEY:}
  project:
    prefix: ${NEON_PROJECT_PREFIX:easyrecord-performance-}
  region: ${NEON_REGION:ap-northeast-1}

# 제품 고유 설정 — 단계 3 BE-CC-2 JWT 5분리 진입 (G84 D=A, Task #122, 2026-06-08).
# jobeval `4dff03a` + mra `38e566d` + jobstructure `d64944e` 3 모범 정합.
app:
  security:
    jwt:
      secret: ${JWT_SECRET:}                                      # 부팅 fail-fast (HS512 ≥64바이트)
      expiration: ${JWT_EXPIRATION_MS:300000}                     # access 5m (자매품 표준 정렬, jobeval 정합)
      refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # refresh 7d
    auth:
      # default tenant 폴백 (구 stub 키 보존) — app.tenancy.default-tenant-id 미설정 시 사용.
      # 인증 격상 (2026-06-12): 사용자 엔티티 + bcrypt 검증 — 이 테넌트의 user_account 를 조회.
      dev-default-tenant-id: ${AUTH_DEV_DEFAULT_TENANT_ID:00000000-0000-0000-0000-000000000001}
  # default-tenant 라우팅 게이트 (단계 2 실 활성, talent `8e29426` / recruit G149 패턴) —
  # 설정 시 JwtAuthFilter 가 전 요청 + DevAccountSeeder 부팅 시드를 해당 테넌트 DB 로 라우팅
  # (TenantRoutingContext.within — control DB 오염 차단). 미설정 시 no-op (단일 DB 모드 무영향).
  # 우선순위: default-tenant-id > app.security.auth.dev-default-tenant-id (폴백 보존).
  # id 설정 + code 누락 = 부팅 fail-fast (lib requireActive code=null throw 사전 차단).
  tenancy:
    default-tenant-id: ${APP_TENANCY_DEFAULT_TENANT_ID:}
    default-tenant-code: ${APP_TENANCY_DEFAULT_TENANT_CODE:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}

# performance-management 자매품 모드 — ADR-031 정정 (2026-06-08, Task #98).
# ~~ADR-030 듀얼 진입 (B2B+B2C)~~ → B2B-Enterprise per-tenant (본질) + SMB Shared (단계 5 옵션).
# B2C 부재 (도메인 본질 = 기업 성과 평가 워크플로우 + HR SoR + 매니저-팀원 1:1).
performance:
  mode: ${PERFORMANCE_MODE:b2b-only}    # b2b-only (단계 1~4, 기본) / smb-shared (단계 5 옵션, application-smb.yml)
  auth:
    # dev 계정 시더 (dev-super-admin/dev-hr-admin/dev-director/dev-manager/dev-employee
    # @performance.dev, pw 'dev') — 기본 OFF. prod ON 금지 (고정 비밀번호, talent/store-hr 패턴).
    seed-dev-accounts: ${PERFORMANCE_AUTH_SEED_DEV_ACCOUNTS:false}
  smb:
    # 단계 5 진입 시 SMB Shared DB URL (application-smb.yml 에서 spring.datasource.url 로 라우팅)
    shared-db-url: ${SMB_SHARED_DB_URL:${spring.datasource.url}}
  # S2S 송신 — performance → easy-talent-management 확정 평가 결과 (G_TALENT_D3 #2, 2026-06-11).
  # talent 수신측: POST /api/internal/sync/performance-results (Bearer + X-Signature HMAC).
  # FINALIZED 만 발신 (sendAll 수동 트리거 — Outbox-light 자동 증분은 후속).
  # LIVE 안전: 미설정 시 송신 0 (EasyTalentResultPushService.isConfigured()=false).
  #
  # S2S 수신 — hcm → performance core-master read-model (P0-S6, 2026-06-11).
  # 수신측: POST /api/internal/sync/core-master (SyncReceiveController 3중 가드).
  # bearer/secret 미설정 시 503 (SYNC_NOT_CONFIGURED) — 호출 자체 차단 = LIVE/dev 무영향.
  # 송신측 hcm 의 hcm.s2s.easyperformance.* 타깃 추가는 hcm repo 별도 슬라이스.
  s2s:
    easytalent:
      base-url: ${EASYTALENT_S2S_BASE_URL:}
      bearer-token: ${EASYTALENT_S2S_BEARER_TOKEN:}
      hmac-secret: ${EASYTALENT_S2S_HMAC_SECRET:}
    hcm:
      bearer-token: ${HCM_S2S_BEARER_TOKEN:}
      hmac-secret: ${HCM_S2S_HMAC_SECRET:}

# easy-platform-core (공유 lib) 의 easyware.neon.* 키 — 게이트 OFF (단계 1 기본) 면 lib 멀티테넌시 빈 미로드
# → 로컬 단일 DB 부팅. 단계 2 Model B 진입 시 control-plane-owner=false (자매품 공유 control DB 소비).
easyware:
  neon:
    multitenancy-enabled: ${APP_NEON_MULTITENANCY_ENABLED:false}
    control-db-url: ${CONTROL_DB_URL:${spring.datasource.url}}
    control-db-username: ${CONTROL_DB_USERNAME:${spring.datasource.username}}
    control-db-password: ${CONTROL_DB_PASSWORD:${spring.datasource.password:}}
    api-key: ${NEON_API_KEY:}
    organization-id: ${NEON_ORGANIZATION_ID:}
    credential-encryption-key: ${TENANT_DB_CREDENTIAL_ENCRYPTION_KEY:}
    platform-admin-username: ${PLATFORM_ADMIN_USERNAME:}
    platform-admin-password: ${PLATFORM_ADMIN_PASSWORD:}
    control-plane-owner: ${APP_NEON_CONTROL_PLANE_OWNER:false}
